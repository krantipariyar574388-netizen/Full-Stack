<!DOCTYPE html>
<html lang="en">
<head>
  <title>Registration Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-cyan-600 flex items-center justify-center px-4">

  <div class="w-full max-w-xl bg-gray-100 rounded-2xl shadow-2xl p-8 md:p-10">
    
    <h1 class="text-4xl font-bold text-center text-black mb-8">
      Registration Form
    </h1>

    <form class="space-y-6">
      
      <input
        type="text"
        placeholder="Name*"
        class="w-full bg-gray-300 rounded-md px-2 py-2 text-xl text-black placeholder-black outline-none focus:ring-2 focus:ring-cyan-600"
      />

      <input
        type="email"
        placeholder="Email*"
        class="w-full bg-gray-300 rounded-md px-2 py-2 text-xl text-black placeholder-black outline-none focus:ring-2 focus:ring-cyan-600"
      />

      <input
        type="tel"
        placeholder="Phone*"
        class="w-full bg-gray-300 rounded-md px-2 py-2 text-xl text-black placeholder-black outline-none focus:ring-2 focus:ring-cyan-600"
      />

      <select
        class="w-full bg-gray-300 rounded-md px-2 py-2 text-xl text-black outline-none focus:ring-2 focus:ring-cyan-600"
      >
        <option selected disabled>Subject*</option>
        <option>HTML</option>
        <option>CSS</option>
        <option>React JS</option>
      </select>

      <textarea
        rows="1"
        placeholder="Message*"
        class="w-full bg-gray-300 rounded-md px-2 py-2 text-xl text-black placeholder-black outline-none resize-none focus:ring-2 focus:ring-cyan-600"
      ></textarea>

      <div class="flex justify-center pt-2">
        <button
          type="submit"
          class="bg-cyan-700 hover:bg-cyan-800 text-white text-2xl px-12 py-3 rounded-md shadow-md transition duration-300"
        >
          Submit
        </button>
      </div>

    </form>
  </div>

</body>
</html>
